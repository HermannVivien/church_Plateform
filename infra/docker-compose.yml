version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web
      - admin

  api:
    build:
      context: ../apps/api
      dockerfile: ../../infra/docker/php/Dockerfile
    volumes:
      - ../apps/api:/var/www/html
    environment:
      - APP_ENV=local
    depends_on:
      - mysql
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: ../../infra/docker/node/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app

  admin:
    build:
      context: ../apps/admin
      dockerfile: ../../infra/docker/node/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ../apps/admin:/app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-church_platform}
      MYSQL_USER: ${DB_USERNAME:-church_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
  redis_data:
